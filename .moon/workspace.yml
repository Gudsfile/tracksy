$schema: ./cache/schemas/workspace.json
projects:
  app: app
  synthetic-datasets: synthetic-datasets
  blog: blog
  e2e: e2e
vcs:
  hooks:
    # HACK: unset GIT_INDEX_FILE is needed to prevent git from locking the index file during a commit before running the moon tasks. This forces moon to use the standard repository index, which prevents the conflict.
    pre-commit:
      - moon run app:format-check
      - moon run app:typecheck
      - moon run synthetic-datasets:typecheck
      - moon run synthetic-datasets:format-check
  defaultBranch: main
  client: git
versionConstraint: ">=2.0.3,<=3.0.0"
telemetry: false

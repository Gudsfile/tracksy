name: Audit datasets generator

on:
  push:
    branches: ["main"]
    paths:
      - "synthetic-datasets/**"
      - ".github/workflows/datasets-test-synthetic.yml"
      - ".moon/toolchains.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "synthetic-datasets/**/*.py"
      - "synthetic-datasets/pyproject.toml"
      - "synthetic-datasets/uv.lock"
      - "synthetic-datasets/moon.yml"
      - ".github/workflows/datasets-test-synthetic.yml"

permissions:
  contents: read

jobs:
  build:
    name: Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./synthetic-datasets

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: false

      - name: Setup toolchains
        run: moon setup

      - name: Run format check
        run: moon run synthetic-datasets:format-check

      - name: Run lint check
        run: moon run synthetic-datasets:lint

      - name: Run type check
        run: moon run synthetic-datasets:typecheck

      - name: Run tests
        run: moon run synthetic-datasets:test

      - name: Generate e2e dataset
        run: moon run synthetic-datasets:generate-e2e

      - name: Verify e2e dataset hashes
        working-directory: ${{ github.workspace }}
        env:
          EXPECTED_JSON_HASH: "c368333c4da5af4105707e7043336cb463620da26276d99096f8f1541dd35314"
          EXPECTED_ZIP_HASH: "c0df9adf694459311af3aacac1b619732f0087d6191efe441142197c93f3b777"
        run: |
          JSON_FILE="e2e/datasets/spotify/Streaming_History_Audio_2006_1000.json"
          ZIP_FILE="e2e/datasets/spotify/streamings_1000.zip"

          ACTUAL_JSON=$(sha256sum "$JSON_FILE" | cut -d' ' -f1)
          ACTUAL_ZIP=$(sha256sum "$ZIP_FILE" | cut -d' ' -f1)

          echo "JSON hash: $ACTUAL_JSON"
          echo "ZIP  hash: $ACTUAL_ZIP"

          FAILED=0
          if [ "$ACTUAL_JSON" != "$EXPECTED_JSON_HASH" ]; then
            echo "❌ JSON hash mismatch — expected: $EXPECTED_JSON_HASH"
            FAILED=1
          fi
          if [ "$ACTUAL_ZIP" != "$EXPECTED_ZIP_HASH" ]; then
            echo "❌ ZIP hash mismatch — expected: $EXPECTED_ZIP_HASH"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "The e2e dataset output has changed."
            echo "Investigate whether this change is intentional (generator logic, seed, dependencies)."
            echo "If intentional, update EXPECTED_JSON_HASH / EXPECTED_ZIP_HASH in datasets-test-synthetic.yml and justify the change in the PR."
            exit 1
          fi

          echo "✅ Hashes match"

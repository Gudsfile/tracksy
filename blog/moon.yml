language: go
tasks:
  dev:
    command: go tool github.com/gohugoio/hugo server --minify -D -E -F
    preset: server
  new-post:
    command: go tool github.com/gohugoio/hugo new
    preset: server
  build:
    command: go tool github.com/gohugoio/hugo --minify
    inputs:
      - archetypes/**/*
      - assets/**/*
      - config/**/*
      - content/**/*
      - static/**/*
      - themes/**/*
      - hugo.toml
      - config/**/*
    outputs:
      - public/**/*
    env:
      HUGO_ENVIRONMENT: production
      HUGO_ENV: production
  tidy:
    command: go mod tidy
  clean:
    command: rm -rf public
layer: application
